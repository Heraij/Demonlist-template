<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom GD Demonlist</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <h1 class="logo">DEMON<span class="accent">LIST</span></h1>
            <nav class="nav-links">
                <a href="#" class="active">Main List</a>
                <a href="#">Leaderboard</a>
                <a href="https://discord.gg/yourlink" target="_blank" class="discord-btn">Join Discord</a>
            </nav>
        </div>
    </header>

    <main class="list-wrapper">
        <section class="list-intro">
            <p>Welcome to the official demonlist. Managed via Discord, updated instantly.</p>
        </section>

        <div id="list-container" class="list-container">
            <div class="loading-text">Loading levels...</div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
