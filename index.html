<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DemonList</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <h1 class="logo"><a href="index.html">Demon<span>List</span></a></h1>
        <p class="description">(No description provided)</p>
    </header>

    <div id="main-view" class="container">
        <main id="list-container" class="list-side">
            </main>

        <aside class="info-side">
            <div class="panel rules-panel">
                <h3>Rules</h3>
                <p>1. Submissions must have audible clicks/taps.</p>
                <p>2. Raw footage must be provided if requested.</p>
                <p>3. No cheat indicators allowed to trigger.</p>
            </div>
            <div class="panel links-panel">
                <h3>Links</h3>
                <a href="https://discord.gg/yourlink" target="_blank" class="link-btn">Join our Discord</a>
            </div>
        </aside>
    </div>

    <div id="level-view" class="container single-level-view hidden">
        <a href="index.html" class="back-btn">← Back to List</a>
        <div id="level-details">
            </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
